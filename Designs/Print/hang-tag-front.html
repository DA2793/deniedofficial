<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DENIED. — Hang Tag Front</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #d0d0d0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Inter', sans-serif; padding: 40px; }
        .label { font-size: 12px; text-transform: uppercase; letter-spacing: 3px; color: #666; margin-bottom: 8px; }
        .spec { font-size: 10px; color: #999; margin-bottom: 40px; }

        .tag {
            width: 330px;
            height: 540px;
            background: #0a0a0a;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 40px 24px 28px;
            position: relative;
        }

        .tag-hole {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #d0d0d0;
            position: absolute;
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
        }

        .tag-section-top {
            margin-top: 12px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .tag-logo img { height: 36px; width: auto; }
        .tag-brand { font-family: 'Bebas Neue', sans-serif; font-size: 42px; color: #fff; letter-spacing: 2px; line-height: 1; }
        .tag-est { font-size: 7px; text-transform: uppercase; letter-spacing: 3px; color: #c9a96e; }

        .tag-section-mid {
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.06);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding: 20px 0;
            width: 100%;
        }

        .tag-tagline {
            font-family: 'Cormorant Garamond', serif;
            font-size: 14px;
            font-style: italic;
            color: #ffffff;
            line-height: 1.7;
        }

        .tag-section-bottom {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .tag-features {
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #c9a96e;
            line-height: 2.2;
        }

        .tag-url { font-size: 8px; text-transform: uppercase; letter-spacing: 2px; color: #999; margin-top: 8px; }
    </style>
</head>
<body>
    <p class="label">Hang Tag — Front</p>
    <p class="spec">5.5cm × 9cm | Black Background | Page 1 of 2</p>

    <div class="tag">
        <div class="tag-hole"></div>
        <div class="tag-section-top">
            <div class="tag-logo"><img src="../../Designs/denied_brand_logo_hd.png" alt="Logo"></div>
            <div class="tag-brand">DENIED.</div>
            <div class="tag-est">Est. 2026</div>
        </div>
        <div class="tag-section-mid">
            <p class="tag-tagline">Not for Everyone.<br>Luxury for the Selected.</p>
        </div>
        <div class="tag-section-bottom">
            <p class="tag-features">
                Made to Order<br>
                Premium Quality<br>
                Limited Edition
            </p>
            <p class="tag-url">@denied._official</p>
            <p class="tag-url">deniedofficial.com</p>
        </div>
    </div>
</body>
</html>
