<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DENIED. — Brand Label Sticker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #c0c0c0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Inter', sans-serif; padding: 60px; }

        .label-title { font-size: 12px; text-transform: uppercase; letter-spacing: 3px; color: #666; margin-bottom: 8px; }
        .label-spec { font-size: 10px; color: #999; margin-bottom: 40px; }

        .sticker {
            width: 800px;
            height: 520px;
            background: transparent;
            border: 1px dashed #999;
            padding: 40px 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }

        /* Brand section */
        .brand-section {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .brand-logo { margin-bottom: 16px; }
        .brand-logo img { height: 72px; width: auto; }

        .brand-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 56px;
            color: #0a0a0a;
            letter-spacing: 4px;
            line-height: 1;
            margin-bottom: 12px;
        }

        .brand-tagline {
            font-family: 'Cormorant Garamond', serif;
            font-size: 14px;
            font-style: italic;
            font-weight: 700;
            color: #0a0a0a;
        }

        /* Divider */
        .divider {
            width: 50px;
            height: 1px;
            background: #0a0a0a;
            opacity: 0.3;
        }

        /* QR Section */
        .qr-section {
            display: flex;
            align-items: flex-start;
            gap: 60px;
        }

        .qr-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .qr-item-header {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .qr-item-header svg { width: 16px; height: 16px; }

        .qr-item-header span {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #0a0a0a;
        }

        .qr-item img {
            width: 90px;
            height: 90px;
        }

        .qr-item-url {
            font-size: 9px;
            color: #0a0a0a;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .note { margin-top: 30px; font-size: 9px; color: #999; text-align: center; line-height: 1.6; }
    </style>
</head>
<body>
    <p class="label-title">Brand Label Sticker</p>
    <p class="label-spec">Transparent Background | Black Content | For White/Brown Packaging</p>

    <div class="sticker">
        <!-- Brand -->
        <div class="brand-section">
            <div class="brand-logo">
                <img src="../../Designs/denied_logo_black.png" alt="DENIED.">
            </div>
            <div class="brand-name">DENIED.</div>
            <p class="brand-tagline">Not for Everyone. Luxury for the Selected.</p>
        </div>

        <!-- Divider -->
        <div class="divider"></div>

        <!-- QR Section -->
        <div class="qr-section">
            <div class="qr-item">
                <div class="qr-item-header">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#0a0a0a" stroke-width="1.5">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="2" y1="12" x2="22" y2="12"/>
                        <path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
                    </svg>
                    <span>Website</span>
                </div>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://deniedofficial.com&color=0a0a0a&bgcolor=ffffff" alt="Website QR">
                <span class="qr-item-url">deniedofficial.com</span>
            </div>

            <div class="qr-item">
                <div class="qr-item-header">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#0a0a0a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
                        <path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z"/>
                        <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
                    </svg>
                    <span>Instagram</span>
                </div>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://www.instagram.com/denied._official/&color=0a0a0a&bgcolor=ffffff" alt="Instagram QR">
                <span class="qr-item-url">@denied._official</span>
            </div>
        </div>
    </div>

    <p class="note">Die-cut sticker. Transparent background, all content in black. Dashed line = cut boundary.</p>
</body>
</html>
