<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Brand Label Sticker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        @page {
            size: 180mm 130mm;
            margin: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            width: 180mm;
            height: 130mm;
            margin: 20mm auto;
            background: #e0e0e0;
        }

        .sticker {
            width: 180mm;
            height: 130mm;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6mm;
            padding: 10mm 15mm;
            text-align: center;
        }

        .brand-logo img { height: 30mm; width: auto; }

        .brand-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 36pt;
            color: #0a0a0a;
            letter-spacing: 4px;
            line-height: 1;
        }

        .divider {
            width: 15mm;
            height: 0.3px;
            background: #0a0a0a;
            opacity: 0.4;
        }

        .qr-section {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            gap: 15mm;
        }

        .qr-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2mm;
        }

        .qr-item-header {
            display: flex;
            align-items: center;
            gap: 2mm;
        }

        .qr-item-header svg { width: 4mm; height: 4mm; }

        .qr-item-header span {
            font-size: 7pt;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #0a0a0a;
            font-weight: 500;
        }

        .qr-item img { width: 20mm; height: 20mm; }

        .qr-item-url {
            font-size: 6pt;
            color: #0a0a0a;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        @media print {
            body { margin: 0; background: white; }
        }
    </style>
</head>
<body>
    <div class="sticker">
        <div class="brand-logo"><img src="../../Designs/denied_logo_black.png" alt="DENIED."></div>

        <div class="brand-name">DENIED.</div>

        <div class="divider"></div>

        <div class="qr-section">
            <div class="qr-item">
                <div class="qr-item-header">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#0a0a0a" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
                    <span>Website</span>
                </div>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://deniedofficial.com&color=0a0a0a&bgcolor=ffffff" alt="Website QR">
                <span class="qr-item-url">deniedofficial.com</span>
            </div>
            <div class="qr-item">
                <div class="qr-item-header">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#0a0a0a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
                    <span>Instagram</span>
                </div>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://www.instagram.com/denied._official/&color=0a0a0a&bgcolor=ffffff" alt="Instagram QR">
                <span class="qr-item-url">@denied._official</span>
            </div>
        </div>
    </div>
</body>
</html>
