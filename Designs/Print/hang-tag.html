<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hang Tag - Front & Back</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        @page {
            size: 55mm 90mm;
            margin: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #1a1a1a;
        }

        .tag {
            width: 55mm;
            height: 90mm;
            background: #0a0a0a;
            border-radius: 3mm;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            margin: 20mm auto;
            page-break-after: always;
        }

        .tag-hole {
            width: 3mm;
            height: 3mm;
            border-radius: 50%;
            border: 0.3mm solid #555;
            position: absolute;
            top: 4mm;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Front */
        .tag-front {
            justify-content: center;
            gap: 5mm;
        }

        .tag-logo img { height: 22mm; width: auto; }
        .tag-brand { font-family: 'Bebas Neue', sans-serif; font-size: 24pt; color: #fff; letter-spacing: 3px; }

        /* Back */
        .tag-back {
            justify-content: space-between;
            padding: 10mm 5mm 5mm;
        }

        .tag-section-top { margin-top: 2mm; text-align: center; }
        .tag-heading { font-family: 'Cormorant Garamond', serif; font-size: 11pt; font-style: italic; color: #fff; margin-bottom: 1mm; }
        .tag-subheading { font-size: 5pt; text-transform: uppercase; letter-spacing: 1.5px; color: #666; }

        .care-list { width: 100%; display: flex; flex-direction: column; gap: 2.5mm; padding: 0 2mm; }
        .care-item { display: flex; align-items: center; gap: 2.5mm; }
        .care-icon { width: 4mm; height: 4mm; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .care-icon svg { width: 3.5mm; height: 3.5mm; }
        .care-text { font-size: 6pt; color: #ccc; }

        .tag-closing { text-align: center; font-family: 'Cormorant Garamond', serif; font-size: 6.5pt; font-style: italic; color: #c9a96e; line-height: 1.5; }

        .sticker-area { width: 100%; }
        .sticker-row { display: flex; justify-content: space-around; margin-bottom: 1.5mm; }
        .sticker-label { font-size: 5.5pt; text-transform: uppercase; letter-spacing: 1.5px; color: #c9a96e; }
        .sticker-blank { width: 100%; height: 7mm; border: 0.3px dashed rgba(255,255,255,0.2); border-radius: 1mm; }

        @media print {
            body { background: #0a0a0a; }
            .tag { margin: 0; }
        }
    </style>
</head>
<body>
    <!-- Page 1: Front -->
    <div class="tag tag-front">
        <div class="tag-hole"></div>
        <div class="tag-logo"><img src="../../Designs/denied_brand_logo_hd.png" alt="Logo"></div>
        <div class="tag-brand">DENIED.</div>
    </div>

    <!-- Page 2: Back -->
    <div class="tag tag-back">
        <div class="tag-hole"></div>
        <div class="tag-section-top">
            <p class="tag-heading">Care Instructions</p>
            <p class="tag-subheading">Handle with Care</p>
        </div>

        <div class="care-list">
            <div class="care-item"><div class="care-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#c9a96e" stroke-width="1.2"><path d="M12 3C9 3 6 5 6 8v1H4l2 12h12l2-12h-2V8c0-3-3-5-6-5z"/><path d="M9 8V7c0-1.7 1.3-3 3-3s3 1.3 3 3v1" stroke-dasharray="2 2"/></svg></div><span class="care-text">Turn Inside Out Before Washing</span></div>
            <div class="care-item"><div class="care-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#c9a96e" stroke-width="1.2"><rect x="3" y="6" width="18" height="14" rx="2"/><circle cx="12" cy="13" r="4"/><circle cx="7" cy="9" r="1" fill="#c9a96e"/></svg></div><span class="care-text">Machine Wash Cold</span></div>
            <div class="care-item"><div class="care-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#c9a96e" stroke-width="1.2"><path d="M4 18L8 6h8l4 12"/><path d="M6 12h12"/><line x1="3" y1="3" x2="21" y2="21" stroke-width="1.5"/></svg></div><span class="care-text">Do Not Iron Directly on Print</span></div>
            <div class="care-item"><div class="care-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#c9a96e" stroke-width="1.2"><path d="M6 4h12l2 4H4l2-4z"/><path d="M4 8v10a2 2 0 002 2h12a2 2 0 002-2V8"/><line x1="3" y1="3" x2="21" y2="21" stroke-width="1.5"/></svg></div><span class="care-text">Do Not Bleach</span></div>
            <div class="care-item"><div class="care-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#c9a96e" stroke-width="1.2"><rect x="4" y="4" width="16" height="16" rx="2"/><circle cx="12" cy="12" r="3"/><path d="M12 6v2M12 16v2M6 12h2M16 12h2"/></svg></div><span class="care-text">Dry on Low Heat</span></div>
            <div class="care-item"><div class="care-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#c9a96e" stroke-width="1.2"><path d="M8 4h8v4a4 4 0 01-4 4 4 4 0 01-4-4V4z"/><line x1="12" y1="12" x2="12" y2="20"/><line x1="8" y1="20" x2="16" y2="20"/></svg></div><span class="care-text">Or Hang to Dry</span></div>
        </div>

        <p class="tag-closing">We hope you love it as much as<br>we loved making it.</p>

        <div class="sticker-area">
            <div class="sticker-row">
                <span class="sticker-label">Size</span>
                <span class="sticker-label">Price</span>
            </div>
            <div class="sticker-blank"></div>
        </div>
    </div>
</body>
</html>
