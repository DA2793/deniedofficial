<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DENIED. — Hang Tag Back</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #d0d0d0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Inter', sans-serif; padding: 40px; }
        .label { font-size: 12px; text-transform: uppercase; letter-spacing: 3px; color: #666; margin-bottom: 8px; }
        .spec { font-size: 10px; color: #999; margin-bottom: 40px; }

        .tag {
            width: 330px;
            height: 540px;
            background: #0a0a0a;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 36px 28px 24px;
            position: relative;
        }

        .tag-hole {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #d0d0d0;
            position: absolute;
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
        }

        .tag-section-top {
            margin-top: 8px;
            text-align: center;
        }

        .tag-heading {
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            font-style: italic;
            color: #fff;
            margin-bottom: 4px;
        }

        .tag-subheading {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #666;
        }

        .care-list {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .care-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .care-icon {
            width: 28px;
            height: 28px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .care-icon svg {
            width: 22px;
            height: 22px;
        }

        .care-text {
            font-size: 9px;
            color: #ccc;
            letter-spacing: 0.5px;
        }

        .tag-closing {
            text-align: center;
            font-family: 'Cormorant Garamond', serif;
            font-size: 11px;
            font-style: italic;
            color: #c9a96e;
            line-height: 1.6;
        }

        .sticker-area {
            width: 100%;
            margin-top: 12px;
        }

        .sticker-row {
            display: flex;
            justify-content: space-around;
            margin-bottom: 6px;
        }

        .sticker-label {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #c9a96e;
        }

        .sticker-blank {
            width: 100%;
            height: 36px;
            border: 1px dashed rgba(255,255,255,0.15);
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <p class="label">Hang Tag — Back</p>
    <p class="spec">5.5cm × 9cm | Black Background | Page 2 of 2</p>

    <div class="tag">
        <div class="tag-hole"></div>
        <div class="tag-section-top">
            <p class="tag-heading">Care Instructions</p>
            <p class="tag-subheading">Handle with Care</p>
        </div>

        <div class="care-list">
            <div class="care-item">
                <div class="care-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#c9a96e" stroke-width="1.2">
                        <path d="M12 3C9 3 6 5 6 8v1H4l2 12h12l2-12h-2V8c0-3-3-5-6-5z"/>
                        <path d="M9 8V7c0-1.7 1.3-3 3-3s3 1.3 3 3v1" stroke-dasharray="2 2"/>
                    </svg>
                </div>
                <span class="care-text">Turn Inside Out Before Washing</span>
            </div>
            <div class="care-item">
                <div class="care-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#c9a96e" stroke-width="1.2">
                        <rect x="3" y="6" width="18" height="14" rx="2"/>
                        <circle cx="12" cy="13" r="4"/>
                        <circle cx="7" cy="9" r="1" fill="#c9a96e"/>
                    </svg>
                </div>
                <span class="care-text">Machine Wash Cold</span>
            </div>
            <div class="care-item">
                <div class="care-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#c9a96e" stroke-width="1.2">
                        <path d="M4 18L8 6h8l4 12"/>
                        <path d="M6 12h12"/>
                        <line x1="3" y1="3" x2="21" y2="21" stroke="#c9a96e" stroke-width="1.5"/>
                    </svg>
                </div>
                <span class="care-text">Do Not Iron Directly on Print</span>
            </div>
            <div class="care-item">
                <div class="care-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#c9a96e" stroke-width="1.2">
                        <path d="M6 4h12l2 4H4l2-4z"/>
                        <path d="M4 8v10a2 2 0 002 2h12a2 2 0 002-2V8"/>
                        <line x1="3" y1="3" x2="21" y2="21" stroke="#c9a96e" stroke-width="1.5"/>
                    </svg>
                </div>
                <span class="care-text">Do Not Bleach</span>
            </div>
            <div class="care-item">
                <div class="care-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#c9a96e" stroke-width="1.2">
                        <rect x="4" y="4" width="16" height="16" rx="2"/>
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M12 6v2M12 16v2M6 12h2M16 12h2"/>
                    </svg>
                </div>
                <span class="care-text">Dry on Low Heat</span>
            </div>
            <div class="care-item">
                <div class="care-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#c9a96e" stroke-width="1.2">
                        <path d="M8 4h8v4a4 4 0 01-4 4 4 4 0 01-4-4V4z"/>
                        <line x1="12" y1="12" x2="12" y2="20"/>
                        <line x1="8" y1="20" x2="16" y2="20"/>
                    </svg>
                </div>
                <span class="care-text">Or Hang to Dry</span>
            </div>
        </div>

        <p class="tag-closing">
            We hope you love it as much as<br>we loved making it.
        </p>

        <!-- Size & Price sticker area -->
        <div class="sticker-area">
            <div class="sticker-row">
                <span class="sticker-label">Size</span>
                <span class="sticker-label">Price</span>
            </div>
            <div class="sticker-blank"></div>
        </div>
    </div>
</body>
</html>
