<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DENIED. — Not for Everyone</title>
    <meta name="description" content="DENIED. — Not for Everyone. Luxury for the Selected. Premium apparel and accessories.">
    <meta property="og:title" content="DENIED. — Not for Everyone">
    <meta property="og:description" content="Luxury for the Selected. Premium apparel and accessories. Coming soon.">
    <meta property="og:url" content="https://deniedofficial.com">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://deniedofficial.com/og-image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="DENIED. — Not for Everyone">
    <meta name="twitter:description" content="Luxury for the Selected. Premium apparel and accessories.">
    <meta name="twitter:image" content="https://deniedofficial.com/og-image.png">
    <link rel="canonical" href="https://deniedofficial.com">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #c9a96e;
            --gold-light: #e0c992;
            --black: #0a0a0a;
            --black-soft: #111111;
            --gray: #666666;
            --gray-light: #999999;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--black);
            color: var(--white);
            min-height: 300vh;
            -webkit-font-smoothing: antialiased;
            position: relative;
        }

        /* ===== SCROLLABLE BLURRED SITE BEHIND ===== */
        .bg-teaser {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 0;
            padding: 80px 60px;
            filter: blur(10px);
            opacity: 0.35;
        }

        .bg-teaser .fake-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 100px; max-width: 900px; margin-left: auto; margin-right: auto; }
        .bg-teaser .fake-logo { width: 120px; height: 18px; background: rgba(255,255,255,0.3); border-radius: 2px; }
        .bg-teaser .fake-links { display: flex; gap: 24px; }
        .bg-teaser .fake-link { width: 60px; height: 10px; background: rgba(255,255,255,0.15); border-radius: 2px; }
        .bg-teaser .fake-hero { text-align: center; margin-bottom: 120px; max-width: 900px; margin-left: auto; margin-right: auto; }
        .bg-teaser .fake-title { width: 450px; max-width: 80%; height: 56px; background: rgba(255,255,255,0.18); border-radius: 4px; margin: 0 auto 20px; }
        .bg-teaser .fake-title-2 { width: 300px; max-width: 60%; height: 56px; background: rgba(255,255,255,0.12); border-radius: 4px; margin: 0 auto 24px; }
        .bg-teaser .fake-subtitle { width: 280px; max-width: 50%; height: 14px; background: rgba(255,255,255,0.08); border-radius: 2px; margin: 0 auto 40px; }
        .bg-teaser .fake-btn { width: 180px; height: 48px; background: rgba(201, 169, 110, 0.25); border-radius: 24px; margin: 0 auto; }
        .bg-teaser .fake-section { max-width: 900px; margin: 0 auto 100px; }
        .bg-teaser .fake-section-title { width: 200px; height: 20px; background: rgba(255,255,255,0.12); border-radius: 2px; margin: 0 auto 48px; }
        .bg-teaser .fake-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
        .bg-teaser .fake-card { aspect-ratio: 3/4; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; }
        .bg-teaser .fake-card-info { height: 80px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.04); border-top: none; border-radius: 0 0 12px 12px; }
        .bg-teaser .fake-text-block { max-width: 600px; margin: 0 auto; text-align: center; }
        .bg-teaser .fake-text-line { height: 12px; background: rgba(255,255,255,0.07); border-radius: 2px; margin-bottom: 12px; }
        .bg-teaser .fake-text-line:nth-child(2) { width: 80%; margin-left: auto; margin-right: auto; }
        .bg-teaser .fake-text-line:nth-child(3) { width: 60%; margin-left: auto; margin-right: auto; }

        /* ===== GLASS OVERLAY ===== */
        .glass-overlay {
            position: fixed;
            inset: 0;
            z-index: 1;
            background: rgba(10, 10, 10, 0.55);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }

        /* ===== FLOATING PARTICLES ===== */
        .particles { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
        .particle { position: absolute; border-radius: 50%; background: var(--gold); }
        .particle:nth-child(1) { width: 4px; height: 4px; left: 10%; top: 15%; animation: drift 7s ease-in-out infinite; }
        .particle:nth-child(2) { width: 3px; height: 3px; left: 25%; top: 70%; animation: drift 6s ease-in-out infinite 1s; }
        .particle:nth-child(3) { width: 5px; height: 5px; left: 40%; top: 20%; animation: drift 8s ease-in-out infinite 0.5s; }
        .particle:nth-child(4) { width: 3px; height: 3px; left: 60%; top: 80%; animation: drift 5s ease-in-out infinite 2s; }
        .particle:nth-child(5) { width: 4px; height: 4px; left: 75%; top: 30%; animation: drift 7s ease-in-out infinite 0.8s; }
        .particle:nth-child(6) { width: 3px; height: 3px; left: 85%; top: 60%; animation: drift 6s ease-in-out infinite 1.5s; }
        .particle:nth-child(7) { width: 4px; height: 4px; left: 50%; top: 45%; animation: drift 8s ease-in-out infinite 0.3s; }
        .particle:nth-child(8) { width: 3px; height: 3px; left: 15%; top: 50%; animation: drift 5.5s ease-in-out infinite 1.8s; }

        @keyframes drift { 0%, 100% { transform: translateY(0); opacity: 0.1; } 50% { transform: translateY(-20px); opacity: 0.4; } }

        .ring { position: fixed; top: 50%; left: 50%; width: 500px; height: 500px; margin: -250px 0 0 -250px; border-radius: 50%; border: 1px solid rgba(201, 169, 110, 0.06); animation: spin 50s linear infinite; z-index: 2; pointer-events: none; }
        .ring-2 { position: fixed; top: 50%; left: 50%; width: 380px; height: 380px; margin: -190px 0 0 -190px; border-radius: 50%; border: 1px solid rgba(201, 169, 110, 0.04); animation: spin 35s linear infinite reverse; z-index: 2; pointer-events: none; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .glow { position: fixed; top: 50%; left: 50%; width: 400px; height: 400px; margin: -200px 0 0 -200px; border-radius: 50%; background: radial-gradient(circle, rgba(201, 169, 110, 0.08) 0%, transparent 70%); animation: breathe 5s ease-in-out infinite; z-index: 2; pointer-events: none; }
        @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.1); opacity: 1; } }

        /* ===== CONTENT ===== */
        .content {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            padding: 40px 24px;
            max-width: 560px;
            width: 100%;
        }

        .content > * { opacity: 0; transform: translateY(25px); animation: reveal 0.8s ease-out forwards; }
        .content > *:nth-child(1) { animation-delay: 0.5s; }
        .content > *:nth-child(2) { animation-delay: 0.7s; }
        .content > *:nth-child(3) { animation-delay: 0.9s; }
        .content > *:nth-child(4) { animation-delay: 1.1s; }
        .content > *:nth-child(5) { animation-delay: 1.3s; }
        .content > *:nth-child(6) { animation-delay: 1.5s; }
        .content > *:nth-child(7) { animation-delay: 1.7s; }
        .content > *:nth-child(8) { animation-delay: 1.9s; }

        @keyframes reveal { to { opacity: 1; transform: translateY(0); } }

        .logo { margin-bottom: 16px; }
        .logo img { height: 60px; width: auto; display: inline-block; animation: logoFloat 4s ease-in-out infinite; animation-delay: 2s; }
        @keyframes logoFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

        .brand-tagline {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--gray-light);
            margin-bottom: 40px;
        }

        .divider {
            width: 60px;
            height: 1px;
            margin: 0 auto 36px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            position: relative;
            overflow: hidden;
        }
        .divider::after { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, var(--gold-light), transparent); animation: shimmer 3s ease-in-out infinite; }
        @keyframes shimmer { 0% { left: -100%; } 100% { left: 100%; } }

        .tagline {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2rem, 6vw, 3.2rem);
            font-weight: 300;
            line-height: 1.25;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }
        .tagline em { color: var(--gold); font-style: italic; }

        .subtitle {
            font-size: 0.85rem;
            color: var(--gray-light);
            font-weight: 300;
            line-height: 1.7;
            margin-bottom: 36px;
            letter-spacing: 0.3px;
        }

        /* Notify form */
        .notify-form {
            display: flex;
            gap: 0;
            max-width: 380px;
            margin: 0 auto 32px;
        }

        .notify-form input {
            flex: 1;
            padding: 14px 18px;
            border: 1px solid rgba(255,255,255,0.12);
            border-right: none;
            border-radius: 50px 0 0 50px;
            background: rgba(255,255,255,0.03);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .notify-form input:focus {
            border-color: var(--gold);
        }

        .notify-form input::placeholder {
            color: var(--gray);
        }

        .notify-form button {
            padding: 14px 24px;
            border: 1px solid rgba(255,255,255,0.12);
            border-left: none;
            border-radius: 0 50px 50px 0;
            background: var(--gold);
            color: var(--black);
            font-family: 'Inter', sans-serif;
            font-size: 0.65rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .notify-form button:hover {
            background: var(--gold-light);
        }

        .notify-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--gray);
            margin-bottom: 12px;
        }

        .insta-section {
            margin-top: 8px;
        }

        .insta-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--gray);
            margin-bottom: 16px;
        }

        .insta-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            background: transparent;
            color: var(--white);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 400;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 50px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .insta-btn:hover { border-color: var(--gold); background: rgba(201, 169, 110, 0.06); transform: scale(1.02); }
        .insta-btn:active { transform: scale(0.97); }
        .insta-btn svg { width: 16px; height: 16px; }

        .footer-note {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.6rem;
            color: rgba(255,255,255,0.15);
            letter-spacing: 2px;
            text-transform: uppercase;
            z-index: 10;
        }

        .success-msg {
            display: none;
            color: var(--gold);
            font-size: 0.8rem;
            margin-bottom: 32px;
        }

        @media (max-width: 600px) {
            .bg-teaser .fake-grid { grid-template-columns: repeat(2, 1fr); }
            .bg-teaser { padding: 40px 24px; }
            .ring { width: 320px; height: 320px; margin: -160px 0 0 -160px; }
            .ring-2 { width: 240px; height: 240px; margin: -120px 0 0 -120px; }
            .glow { width: 280px; height: 280px; margin: -140px 0 0 -140px; }
            .notify-form { flex-direction: column; gap: 8px; }
            .notify-form input { border-radius: 50px; border-right: 1px solid rgba(255,255,255,0.12); }
            .notify-form button { border-radius: 50px; border-left: 1px solid var(--gold); }
        }
    </style>
</head>
<body>
    <!-- Scrollable blurred site behind -->
    <div class="bg-teaser">
        <div class="fake-nav"><div class="fake-logo"></div><div class="fake-links"><div class="fake-link"></div><div class="fake-link"></div><div class="fake-link"></div><div class="fake-link"></div></div></div>
        <div class="fake-hero"><div class="fake-title"></div><div class="fake-title-2"></div><div class="fake-subtitle"></div><div class="fake-btn"></div></div>
        <div class="fake-section"><div class="fake-section-title"></div><div class="fake-grid"><div><div class="fake-card"></div><div class="fake-card-info"></div></div><div><div class="fake-card"></div><div class="fake-card-info"></div></div><div><div class="fake-card"></div><div class="fake-card-info"></div></div></div></div>
        <div class="fake-section"><div class="fake-section-title"></div><div class="fake-text-block"><div class="fake-text-line"></div><div class="fake-text-line"></div><div class="fake-text-line"></div></div></div>
        <div class="fake-section"><div class="fake-section-title"></div><div class="fake-grid"><div><div class="fake-card"></div><div class="fake-card-info"></div></div><div><div class="fake-card"></div><div class="fake-card-info"></div></div><div><div class="fake-card"></div><div class="fake-card-info"></div></div></div></div>
    </div>

    <!-- Glass overlay -->
    <div class="glass-overlay"></div>

    <!-- Decorative -->
    <div class="glow"></div>
    <div class="ring"></div>
    <div class="ring-2"></div>
    <div class="particles"><div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div></div>

    <!-- Content -->
    <div class="content">
        <div class="logo">
            <img src="assets/Brand Logo.png" alt="DENIED.">
        </div>

        <p class="brand-tagline">Not for Everyone. Luxury for the Selected.</p>

        <div class="divider"></div>

        <h1 class="tagline">Luxury Takes <em>Time.</em><br>Worth the <em>Wait.</em></h1>

        <p class="subtitle">Something exclusive is being crafted. Stay close.</p>

        <!-- Notify Me -->
        <p class="notify-label">Be the first to know</p>

        <form class="notify-form" id="notifyForm">
            <input type="email" placeholder="your@email.com" required id="emailInput">
            <button type="submit">Notify Me</button>
        </form>

        <p class="success-msg" id="successMsg">You're on the list. We'll reach out.</p>

        <!-- Instagram -->
        <div class="insta-section">
            <p class="insta-label">Meanwhile, follow the journey</p>
            <a href="https://www.instagram.com/denied._official/" target="_blank" rel="noopener" class="insta-btn">
                <svg fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
                </svg>
                @denied._official
            </a>
        </div>
    </div>

    <p class="footer-note">&copy; 2026 DENIED.</p>

    <script>
        document.getElementById('notifyForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var email = document.getElementById('emailInput').value;
            document.getElementById('notifyForm').style.display = 'none';
            document.getElementById('successMsg').style.display = 'block';
            document.getElementById('emailInput').value = '';
            // TODO: Connect to email service (Supabase/Mailchimp) later
            console.log('Email captured:', email);
        });
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
