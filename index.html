<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="DENIED. — Not for Everyone. Luxury for Selected. Premium apparel and accessories.">
    <meta property="og:title" content="DENIED. — Not for Everyone">
    <meta property="og:description" content="Luxury for Selected. Premium apparel and accessories.">
    <meta property="og:url" content="https://deniedofficial.com">
    <meta property="og:type" content="website">
    <link rel="canonical" href="https://deniedofficial.com">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #c9a96e;
            --gold-light: #e0c992;
            --black: #0a0a0a;
            --black-soft: #111111;
            --gray: #666666;
            --gray-light: #999999;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--black);
            color: var(--white);
            min-height: 300vh;
            -webkit-font-smoothing: antialiased;
            position: relative;
        }

        /* ===== SCROLLABLE BLURRED SITE BEHIND ===== */
        .bg-teaser {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 0;
            padding: 80px 60px;
            filter: blur(10px);
            opacity: 0.35;
        }

        .bg-teaser .fake-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 100px;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        .bg-teaser .fake-logo {
            width: 120px;
            height: 18px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
        }

        .bg-teaser .fake-links {
            display: flex;
            gap: 24px;
        }

        .bg-teaser .fake-link {
            width: 60px;
            height: 10px;
            background: rgba(255,255,255,0.15);
            border-radius: 2px;
        }

        .bg-teaser .fake-hero {
            text-align: center;
            margin-bottom: 120px;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        .bg-teaser .fake-title {
            width: 450px;
            max-width: 80%;
            height: 56px;
            background: rgba(255,255,255,0.18);
            border-radius: 4px;
            margin: 0 auto 20px;
        }

        .bg-teaser .fake-title-2 {
            width: 300px;
            max-width: 60%;
            height: 56px;
            background: rgba(255,255,255,0.12);
            border-radius: 4px;
            margin: 0 auto 24px;
        }

        .bg-teaser .fake-subtitle {
            width: 280px;
            max-width: 50%;
            height: 14px;
            background: rgba(255,255,255,0.08);
            border-radius: 2px;
            margin: 0 auto 40px;
        }

        .bg-teaser .fake-btn {
            width: 180px;
            height: 48px;
            background: rgba(201, 169, 110, 0.25);
            margin: 0 auto;
        }

        .bg-teaser .fake-section {
            max-width: 900px;
            margin: 0 auto 100px;
        }

        .bg-teaser .fake-section-title {
            width: 200px;
            height: 20px;
            background: rgba(255,255,255,0.12);
            border-radius: 2px;
            margin: 0 auto 48px;
        }

        .bg-teaser .fake-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        .bg-teaser .fake-card {
            aspect-ratio: 3/4;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
        }

        .bg-teaser .fake-card-info {
            height: 80px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.04);
            border-top: none;
        }

        .bg-teaser .fake-text-block {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }

        .bg-teaser .fake-text-line {
            height: 12px;
            background: rgba(255,255,255,0.07);
            border-radius: 2px;
            margin-bottom: 12px;
        }

        .bg-teaser .fake-text-line:nth-child(2) { width: 80%; margin-left: auto; margin-right: auto; }
        .bg-teaser .fake-text-line:nth-child(3) { width: 60%; margin-left: auto; margin-right: auto; }

        /* ===== GLASS OVERLAY ===== */
        .glass-overlay {
            position: fixed;
            inset: 0;
            z-index: 1;
            background: rgba(10, 10, 10, 0.55);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }

        /* ===== FLOATING PARTICLES ===== */
        .particles {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: var(--gold);
        }

        .particle:nth-child(1) { width: 4px; height: 4px; left: 10%; top: 15%; animation: drift 7s ease-in-out infinite; }
        .particle:nth-child(2) { width: 3px; height: 3px; left: 25%; top: 70%; animation: drift 6s ease-in-out infinite 1s; }
        .particle:nth-child(3) { width: 5px; height: 5px; left: 40%; top: 20%; animation: drift 8s ease-in-out infinite 0.5s; }
        .particle:nth-child(4) { width: 3px; height: 3px; left: 60%; top: 80%; animation: drift 5s ease-in-out infinite 2s; }
        .particle:nth-child(5) { width: 4px; height: 4px; left: 75%; top: 30%; animation: drift 7s ease-in-out infinite 0.8s; }
        .particle:nth-child(6) { width: 3px; height: 3px; left: 85%; top: 60%; animation: drift 6s ease-in-out infinite 1.5s; }
        .particle:nth-child(7) { width: 4px; height: 4px; left: 50%; top: 45%; animation: drift 8s ease-in-out infinite 0.3s; }
        .particle:nth-child(8) { width: 3px; height: 3px; left: 15%; top: 50%; animation: drift 5.5s ease-in-out infinite 1.8s; }

        @keyframes drift {
            0%, 100% { transform: translateY(0); opacity: 0.1; }
            50% { transform: translateY(-20px); opacity: 0.4; }
        }

        /* Rotating rings */
        .ring {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 500px;
            height: 500px;
            margin: -250px 0 0 -250px;
            border-radius: 50%;
            border: 1px solid rgba(201, 169, 110, 0.06);
            animation: spin 50s linear infinite;
            z-index: 2;
            pointer-events: none;
        }

        .ring-2 {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 380px;
            height: 380px;
            margin: -190px 0 0 -190px;
            border-radius: 50%;
            border: 1px solid rgba(201, 169, 110, 0.04);
            animation: spin 35s linear infinite reverse;
            z-index: 2;
            pointer-events: none;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Gold glow */
        .glow {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 400px;
            height: 400px;
            margin: -200px 0 0 -200px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(201, 169, 110, 0.08) 0%, transparent 70%);
            animation: breathe 5s ease-in-out infinite;
            z-index: 2;
            pointer-events: none;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        /* ===== CONTENT (fixed center) ===== */
        .content {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            padding: 40px 24px;
            max-width: 580px;
            width: 100%;
        }

        /* Staggered entrance */
        .content > * {
            opacity: 0;
            transform: translateY(25px);
            animation: reveal 0.8s ease-out forwards;
        }

        .content > *:nth-child(1) { animation-delay: 0.5s; }
        .content > *:nth-child(2) { animation-delay: 0.7s; }
        .content > *:nth-child(3) { animation-delay: 0.9s; }
        .content > *:nth-child(4) { animation-delay: 1.1s; }
        .content > *:nth-child(5) { animation-delay: 1.3s; }
        .content > *:nth-child(6) { animation-delay: 1.5s; }

        @keyframes reveal {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Logo */
        .logo {
            margin-bottom: 48px;
        }

        .logo img {
            height: 60px;
            width: auto;
            display: inline-block;
            animation: logoFloat 4s ease-in-out infinite;
            animation-delay: 2s;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        /* Divider */
        .divider {
            width: 60px;
            height: 1px;
            margin: 0 auto 40px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            position: relative;
            overflow: hidden;
        }

        .divider::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, var(--gold-light), transparent);
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        /* Typography */
        .tagline {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.4rem, 7vw, 3.8rem);
            font-weight: 300;
            line-height: 1.25;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }

        .tagline em {
            color: var(--gold);
            font-style: italic;
        }

        .subtitle {
            font-size: 0.95rem;
            color: var(--gray-light);
            font-weight: 300;
            line-height: 1.7;
            margin-bottom: 48px;
            letter-spacing: 0.3px;
        }

        .insta-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--gray);
            margin-bottom: 20px;
        }

        /* Instagram button - dark themed */
        .insta-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 36px;
            background: transparent;
            color: var(--white);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 400;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .insta-btn:hover {
            border-color: var(--gold);
            background: rgba(201, 169, 110, 0.06);
            transform: scale(1.02);
        }

        .insta-btn:active {
            transform: scale(0.97);
        }

        .insta-btn svg {
            width: 18px;
            height: 18px;
        }

        /* Footer */
        .footer-note {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.65rem;
            color: rgba(255,255,255,0.2);
            letter-spacing: 2px;
            text-transform: uppercase;
            z-index: 10;
        }

        @media (max-width: 600px) {
            .bg-teaser .fake-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .bg-teaser {
                padding: 40px 24px;
            }

            .ring { width: 320px; height: 320px; margin: -160px 0 0 -160px; }
            .ring-2 { width: 240px; height: 240px; margin: -120px 0 0 -120px; }
            .glow { width: 280px; height: 280px; margin: -140px 0 0 -140px; }
        }
    </style>
</head>
