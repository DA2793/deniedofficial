<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DENIED. — Not for Everyone</title>
    <meta name="description" content="DENIED. — Not for Everyone. Luxury for Selected. Premium apparel and accessories.">
    <meta property="og:title" content="DENIED. — Not for Everyone">
    <meta property="og:description" content="Luxury for Selected. Premium apparel and accessories.">
    <meta property="og:url" content="https://deniedofficial.com">
    <meta property="og:type" content="website">
    <link rel="canonical" href="https://deniedofficial.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #c9a96e;
            --gold-light: #e0c992;
            --black: #0a0a0a;
            --gray: #666666;
            --gray-light: #999999;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .mask-page {
            text-align: center;
            padding: 40px 24px;
            position: relative;
            z-index: 2;
        }

        .logo {
            margin-bottom: 60px;
        }

        .logo img {
            height: 56px;
            width: auto;
            display: inline-block;
        }

        .tagline {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.2rem, 6vw, 4rem);
            font-weight: 300;
            line-height: 1.2;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }

        .tagline .gold {
            color: var(--gold);
        }

        .subtitle {
            font-size: 0.95rem;
            color: var(--gray-light);
            font-weight: 300;
            margin-bottom: 60px;
            letter-spacing: 0.5px;
        }

        .divider {
            width: 40px;
            height: 1px;
            background: var(--gold);
            margin: 0 auto 40px;
            opacity: 0.6;
        }

        .insta-text {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--gray);
            margin-bottom: 24px;
        }

        .insta-link {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 14px 32px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: var(--white);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .insta-link:hover {
            border-color: var(--gold);
            background: rgba(201, 169, 110, 0.05);
        }

        .insta-link svg {
            width: 20px;
            height: 20px;
        }

        /* Background glow */
        .bg-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(201, 169, 110, 0.04) 0%, transparent 60%);
            pointer-events: none;
            z-index: 1;
            animation: breathe 6s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
        }

        .footer-note {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            color: var(--gray);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <div class="mask-page">
        <div class="logo">
            <img src="assets/Brand Logo.png" alt="DENIED.">
        </div>

        <h1 class="tagline">Luxury Takes Time<span class="gold">.</span><br>Worth the Wait<span class="gold">.</span></h1>
        <p class="subtitle">Something exclusive is being crafted. Not for everyone.</p>

        <div class="divider"></div>

        <p class="insta-text">Meanwhile, follow the journey</p>

        <a href="https://www.instagram.com/denied._official/" target="_blank" rel="noopener" class="insta-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
                <path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z"/>
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
            </svg>
            @denied._official
        </a>
    </div>

    <p class="footer-note">&copy; 2026 DENIED.</p>
</body>
</html>
