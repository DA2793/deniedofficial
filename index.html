<head>

    <meta property="og:title" content="DENIED. — Not for Everyone">
    <meta property="og:description" content="Luxury for Selected. Premium apparel and accessories.">

    <link rel="canonical" href="https://deniedofficial.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #c9a96e;
            --gold-light: #e0c992;
            --black: #0a0a0a;
            --gray: #666666;
            --gray-light: #999999;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--black);
            color: var(--white);
            min-height: 300vh;
            -webkit-font-smoothing: antialiased;
            position: relative;
        }

        /* ===== BLURRED BACKGROUND - scrollable "site" behind glass ===== */
        .bg-teaser {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 0;
            padding: 80px 60px;
            filter: blur(10px);
            opacity: 0.35;
        }

        .bg-teaser .fake-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 100px;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        .bg-teaser .fake-logo {
            width: 120px;
            height: 18px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
        }

        .bg-teaser .fake-links {
            display: flex;
            gap: 24px;
        }

        .bg-teaser .fake-link {
            width: 60px;
            height: 10px;
            background: rgba(255,255,255,0.15);
            border-radius: 2px;
        }

        .bg-teaser .fake-hero {
            text-align: center;
            margin-bottom: 120px;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        .bg-teaser .fake-title {
            width: 450px;
            max-width: 80%;
            height: 56px;
            background: rgba(255,255,255,0.18);
            border-radius: 4px;
            margin: 0 auto 20px;
        }

        .bg-teaser .fake-title-2 {
            width: 300px;
            max-width: 60%;
            height: 56px;
            background: rgba(255,255,255,0.12);
            border-radius: 4px;
            margin: 0 auto 24px;
        }

        .bg-teaser .fake-subtitle {
            width: 280px;
            max-width: 50%;
            height: 14px;
            background: rgba(255,255,255,0.08);
            border-radius: 2px;
            margin: 0 auto 40px;
        }

        .bg-teaser .fake-btn {
            width: 180px;
            height: 48px;
            background: rgba(201, 169, 110, 0.25);
            margin: 0 auto;
        }

        .bg-teaser .fake-section {
            max-width: 900px;
            margin: 0 auto 100px;
        }

        .bg-teaser .fake-section-title {
            width: 200px;
            height: 20px;
            background: rgba(255,255,255,0.12);
            border-radius: 2px;
            margin: 0 auto 48px;
        }

        .bg-teaser .fake-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        .bg-teaser .fake-card {
            aspect-ratio: 3/4;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
        }

        .bg-teaser .fake-card-info {
            height: 80px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.04);
            border-top: none;
        }

        .bg-teaser .fake-text-block {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }

        .bg-teaser .fake-text-line {
            height: 12px;
            background: rgba(255,255,255,0.07);
            border-radius: 2px;
            margin-bottom: 12px;
        }

        .bg-teaser .fake-text-line:nth-child(2) { width: 80%; margin-left: auto; margin-right: auto; }
        .bg-teaser .fake-text-line:nth-child(3) { width: 60%; margin-left: auto; margin-right: auto; }

        /* Floating particles */
        .bg-particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.12;
            animation: float 8s ease-in-out infinite;
        }

        .particle:nth-child(1) {
            width: 300px;
            height: 300px;
            background: var(--gold);
            top: 10%;
            left: 15%;
            animation-delay: 0s;
        }

        .particle:nth-child(2) {
            width: 200px;
            height: 200px;
            background: var(--gold);
            top: 60%;
            right: 10%;
            animation-delay: -3s;
        }

        .particle:nth-child(3) {
            width: 150px;
            height: 150px;
            background: var(--white);
            bottom: 20%;
            left: 40%;
            animation-delay: -5s;
            opacity: 0.04;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
        }

        /* ===== GLASS OVERLAY - fixed, stays while you scroll ===== */
        .glass-overlay {
            position: fixed;
            inset: 0;
            z-index: 1;
            background: rgba(10, 10, 10, 0.55);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }

        /* ===== MAIN CONTENT - fixed center ===== */
        .mask-page {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            padding: 40px 24px;
            z-index: 2;
            width: 100%;
            max-width: 600px;
        }

        .logo {
            margin-bottom: 60px;
        }

        .logo img {
            height: 56px;
            width: auto;
            display: inline-block;
        }

        .tagline {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.2rem, 6vw, 4rem);
            font-weight: 300;
            line-height: 1.2;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }

        .tagline .gold {
            color: var(--gold);
        }

        .subtitle {
            font-size: 0.95rem;
            color: var(--gray-light);
            font-weight: 300;
            margin-bottom: 60px;
            letter-spacing: 0.5px;
        }

        .divider {
            width: 40px;
            height: 1px;
            background: var(--gold);
            margin: 0 auto 40px;
            opacity: 0.6;
        }

        .insta-text {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--gray);
            margin-bottom: 24px;
        }

        .insta-link {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 14px 32px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: var(--white);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .insta-link:hover {
            border-color: var(--gold);
            background: rgba(201, 169, 110, 0.08);
        }

        .insta-link svg {
            width: 20px;
            height: 20px;
        }

        .footer-note {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            color: var(--gray);
            letter-spacing: 1px;
            text-transform: uppercase;
            z-index: 2;
        }

        /* Scroll hint */
        .scroll-hint {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            animation: bounce 2s ease-in-out infinite;
            opacity: 0.4;
        }

        .scroll-hint svg {
            width: 20px;
            height: 20px;
            stroke: var(--gray-light);
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(8px); }
        }

        @media (max-width: 600px) {
            .bg-teaser .fake-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .bg-teaser {
                padding: 40px 24px;
            }
        }
    </style>
</head>
