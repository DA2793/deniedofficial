<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="DENIED. — Not for Everyone. Luxury for Selected. Premium apparel and accessories.">
    <meta property="og:title" content="DENIED. — Not for Everyone">
    <meta property="og:description" content="Luxury for Selected. Premium apparel and accessories.">
    <meta property="og:url" content="https://deniedofficial.com">
    <meta property="og:type" content="website">
    <link rel="canonical" href="https://deniedofficial.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #c9a96e;
            --gold-light: #e0c992;
            --gold-dim: rgba(201, 169, 110, 0.15);
            --black: #0a0a0a;
            --black-soft: #111111;
            --gray: #666666;
            --gray-light: #999999;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            position: relative;
        }

        /* ===== BACKGROUND LAYER ===== */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        /* Blurred backdrop */
        .backdrop-blur {
            position: absolute;
            inset: 0;
            backdrop-filter: blur(60px);
            -webkit-backdrop-filter: blur(60px);
            background: rgba(10, 10, 10, 0.85);
        }

        /* Floating particles */
        .particle {
            position: absolute;
            border-radius: 50%;
            background: var(--gold);
        }

        .particle:nth-child(1) { width: 4px; height: 4px; left: 10%; top: 15%; animation: drift 7s ease-in-out infinite; }
        .particle:nth-child(2) { width: 3px; height: 3px; left: 25%; top: 70%; animation: drift 6s ease-in-out infinite 1s; }
        .particle:nth-child(3) { width: 5px; height: 5px; left: 40%; top: 20%; animation: drift 8s ease-in-out infinite 0.5s; }
        .particle:nth-child(4) { width: 3px; height: 3px; left: 60%; top: 80%; animation: drift 5s ease-in-out infinite 2s; }
        .particle:nth-child(5) { width: 4px; height: 4px; left: 75%; top: 30%; animation: drift 7s ease-in-out infinite 0.8s; }
        .particle:nth-child(6) { width: 3px; height: 3px; left: 85%; top: 60%; animation: drift 6s ease-in-out infinite 1.5s; }
        .particle:nth-child(7) { width: 4px; height: 4px; left: 50%; top: 45%; animation: drift 8s ease-in-out infinite 0.3s; }
        .particle:nth-child(8) { width: 3px; height: 3px; left: 15%; top: 50%; animation: drift 5.5s ease-in-out infinite 1.8s; }
        .particle:nth-child(9) { width: 2px; height: 2px; left: 90%; top: 40%; animation: drift 6.5s ease-in-out infinite 2.2s; }
        .particle:nth-child(10) { width: 3px; height: 3px; left: 35%; top: 85%; animation: drift 7.5s ease-in-out infinite 0.7s; }

        @keyframes drift {
            0%, 100% { transform: translateY(0); opacity: 0.1; }
            50% { transform: translateY(-20px); opacity: 0.4; }
        }

        /* Rotating ring */
        .ring {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 500px;
            height: 500px;
            margin: -250px 0 0 -250px;
            border-radius: 50%;
            border: 1px solid rgba(201, 169, 110, 0.06);
            animation: spin 50s linear infinite;
        }

        .ring-2 {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 380px;
            height: 380px;
            margin: -190px 0 0 -190px;
            border-radius: 50%;
            border: 1px solid rgba(201, 169, 110, 0.04);
            animation: spin 35s linear infinite reverse;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Gold glow */
        .glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 400px;
            height: 400px;
            margin: -200px 0 0 -200px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(201, 169, 110, 0.08) 0%, transparent 70%);
            animation: breathe 5s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        /* ===== CONTENT ===== */
        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 40px 24px;
            max-width: 580px;
        }

        /* Staggered entrance animations */
        .content > * {
            opacity: 0;
            transform: translateY(25px);
            animation: reveal 0.8s ease-out forwards;
        }

        .content > *:nth-child(1) { animation-delay: 0.5s; }
        .content > *:nth-child(2) { animation-delay: 0.7s; }
        .content > *:nth-child(3) { animation-delay: 0.9s; }
        .content > *:nth-child(4) { animation-delay: 1.1s; }
        .content > *:nth-child(5) { animation-delay: 1.3s; }
        .content > *:nth-child(6) { animation-delay: 1.5s; }
        .content > *:nth-child(7) { animation-delay: 1.7s; }

        @keyframes reveal {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Logo */
        .logo {
            margin-bottom: 48px;
        }

        .logo img {
            height: 60px;
            width: auto;
            display: inline-block;
            animation: logoFloat 4s ease-in-out infinite;
            animation-delay: 2s;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        /* Divider */
        .divider {
            width: 60px;
            height: 1px;
            margin: 0 auto 40px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            position: relative;
            overflow: hidden;
        }

        .divider::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, var(--gold-light), transparent);
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        /* Typography */
        .tagline {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.4rem, 7vw, 3.8rem);
            font-weight: 300;
            line-height: 1.25;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }

        .tagline em {
            color: var(--gold);
            font-style: italic;
        }

        .subtitle {
            font-size: 0.95rem;
            color: var(--gray-light);
            font-weight: 300;
            line-height: 1.7;
            margin-bottom: 48px;
            letter-spacing: 0.3px;
        }

        .insta-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--gray);
            margin-bottom: 20px;
        }

        /* Instagram button */
        .insta-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 36px;
            background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
            color: var(--white);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 400;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border-radius: 50px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 32px rgba(131, 58, 180, 0.2);
        }

        .insta-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 12px 48px rgba(131, 58, 180, 0.3);
        }

        .insta-btn:active {
            transform: scale(0.97);
        }

        .insta-btn svg {
            width: 18px;
            height: 18px;
        }

        /* Email */
        .email-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 24px;
            color: var(--gray-light);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 300;
            letter-spacing: 0.5px;
            transition: color 0.3s ease;
        }

        .email-link:hover {
            color: var(--gold);
        }

        .email-link svg {
            width: 16px;
            height: 16px;
        }

        /* Footer */
        .footer-note {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.65rem;
            color: rgba(255,255,255,0.2);
            letter-spacing: 2px;
            text-transform: uppercase;
            z-index: 2;
        }

        @media (max-width: 480px) {
            .ring { width: 320px; height: 320px; margin: -160px 0 0 -160px; }
            .ring-2 { width: 240px; height: 240px; margin: -120px 0 0 -120px; }
            .glow { width: 280px; height: 280px; margin: -140px 0 0 -140px; }
        }
    </style>
</head>
<body>

        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
